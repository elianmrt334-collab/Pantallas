```html
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia COOSAJO - Receptor Nube</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; background-color: #f1f5f9; cursor: none; }
        .bg-abstract { background-image: url('abstract-white-background-with-elegant-curving-lin-2026-01-07-23-20-12-utc.jpg'); background-size: cover; opacity: 0.6; position: absolute; inset: 0; z-index: 0; }
        @keyframes scroll-left { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
        .animate-marquee { animation: scroll-left 45s linear infinite; }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        .animate-progress { animation: progress 8s linear infinite; }
        .video-frame { border: 12px solid white; border-radius: 2.5rem; background: #0f172a; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        #sidebar { transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); width: 431px; }
        #sidebar.hidden-sidebar { width: 0; opacity: 0; margin-right: -1.5rem; transform: translateX(-40px); }
    </style>
</head>
<body class="w-full h-screen flex flex-col relative" onclick="enableAudio()">
    <div class="bg-abstract"></div>

    <header class="relative z-50 h-[125px] bg-white border-b-[6px] border-[#158e45] flex items-center justify-between px-10 shadow-lg">
        <img src="LOGO COOSAJO SIN ESLOGAN.png" class="h-20" onerror="this.src='https://placehold.co/200x80?text=COOSAJO'">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 px-5 py-2.5 rounded-2xl">
                <img src="LOGO FACEBOOK.png" class="w-5 h-5">
                <span class="font-bold text-[#172e59] text-sm uppercase">COOSAJO</span>
            </div>
            <div class="flex items-center gap-2 bg-[#158e45] text-white px-6 py-3 rounded-2xl">
                <i data-lucide="globe" class="w-5 h-5"></i>
                <span class="font-black text-sm uppercase tracking-widest">www.coosajo.com</span>
            </div>
        </div>
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-4 bg-blue-50/50 px-6 py-2 rounded-2xl border border-blue-100">
                <i data-lucide="cloud-sun" class="w-10 h-10 text-[#172e59]"></i>
                <div class="flex flex-col text-right">
                    <span class="font-black text-3xl text-[#172e59]">24°C</span>
                    <span class="text-[10px] uppercase font-black text-[#158e45]">Esquipulas</span>
                </div>
            </div>
            <div class="text-right border-l-[3px] border-slate-100 pl-10">
                <div id="clock" class="font-black text-4xl text-[#172e59]">--:--</div>
                <div id="date" class="text-[10px] text-[#158e45] font-black uppercase">Cargando...</div>
            </div>
        </div>
    </header>

    <main class="relative z-10 flex-1 flex gap-6 p-6 min-h-0">
        <div id="sidebar" class="h-full relative overflow-hidden video-frame flex-shrink-0 border-none bg-slate-900">
            <div id="banners" class="absolute inset-0"></div>
            <div id="progress" class="absolute top-5 left-0 right-0 flex justify-center gap-1.5 z-20 px-6"></div>
        </div>

        <div class="flex-1 min-w-0 h-full relative overflow-hidden video-frame flex items-center justify-center">
            <video id="live" class="absolute inset-0 w-full h-full object-contain z-10 opacity-0 transition-opacity" autoplay playsinline></video>
            
            <div id="waiting" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-slate-900/40">
                <img src="LOGO COOSAJO SIN ESLOGAN.png" class="h-20 mb-8 opacity-20 grayscale">
                <h2 class="text-4xl font-black uppercase tracking-[0.4em] text-slate-300 mb-8 italic">Buscando Señal Nube...</h2>
                <p id="netStatus" class="text-[#158e45] font-bold text-xs uppercase animate-pulse">Plataforma COOSAJO Activa</p>
            </div>
        </div>
    </main>

    <footer class="relative z-50 h-[85px] bg-[#172e59] text-white flex items-center overflow-hidden border-t-4 border-white/5">
        <div class="absolute left-0 top-0 bottom-0 z-20 bg-[#158e45] flex items-center px-10">
            <span class="font-black text-2xl uppercase tracking-tighter italic">NOTICIAS COOSAJO</span>
        </div>
        <div class="whitespace-nowrap animate-marquee flex items-center gap-24 text-2xl font-bold ml-[350px]">
            <span>✨ ¡Ahorrar tiene premio! Magicuenta de <strong class="text-yellow-400">Q50</strong>.</span>
            <span>🚀 Impulsa tu negocio con COOSAJO. Tu futuro empieza hoy.</span>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, doc, onSnapshot, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        lucide.createIcons();
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-coosajo';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const live = document.getElementById('live');
        const screenId = 'SCREEN-' + Math.random().toString(36).substring(7).toUpperCase();
        let peer = null;

        const init = async () => {
            await signInAnonymously(auth);
            // Registrar pantalla en Firebase
            const screenRef = doc(db, 'artifacts', appId, 'public', 'data', 'screens', screenId);
            await setDoc(screenRef, { name: 'Agencia Esquipulas', lastSeen: Date.now() });
            window.addEventListener('beforeunload', () => deleteDoc(screenRef));

            peer = new Peer(screenId);
            
            // Escuchar el estado de la plataforma en Firebase
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'platformState'), (snapshot) => {
                const state = snapshot.data();
                if (state && state.isLive) {
                    const call = peer.call(state.masterId, new MediaStream());
                    call.on('stream', (stream) => {
                        live.srcObject = stream;
                        live.style.opacity = "1";
                        document.getElementById('waiting').classList.add('hidden');
                        document.getElementById('sidebar').classList.add('hidden-sidebar');
                    });
                } else {
                    location.reload();
                }
            });
        };

        // Reloj e Interfaz
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('es-GT', {hour:'2-digit', minute:'2-digit', hour12: true});
            document.getElementById('date').textContent = now.toLocaleDateString('es-GT', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
        }, 1000);

        function initBanners() {
            const container = document.getElementById('banners');
            const progress = document.getElementById('progress');
            for(let i=1; i<=8; i++) {
                const b = document.createElement('img');
                b.src = `Lateral ${i}.png`;
                b.className = `absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 ${i===1?'opacity-100 z-10':'opacity-0 z-0'}`;
                b.id = `b-${i}`;
                container.appendChild(b);

                const p = document.createElement('div');
                p.className = "h-1 flex-1 bg-white/20 rounded-full overflow-hidden";
                p.innerHTML = `<div id="p-${i}" class="h-full bg-[#158e45] w-full ${i===1?'animate-progress':'opacity-0'}"></div>`;
                progress.appendChild(p);
            }
            let cur = 1;
            setInterval(() => {
                document.getElementById(`b-${cur}`).style.opacity = 0;
                document.getElementById(`p-${cur}`).className = "h-full bg-[#158e45] w-full opacity-100";
                cur = cur % 8 + 1;
                document.getElementById(`b-${cur}`).style.opacity = 1;
                document.getElementById(`p-${cur}`).className = "h-full bg-[#158e45] w-full animate-progress";
                if(cur === 1) for(let i=2; i<=8; i++) document.getElementById(`p-${i}`).className = "h-full bg-[#158e45] w-full opacity-0";
            }, 8000);
        }

        window.enableAudio = () => { live.muted = false; live.play().catch(()=>{}); };
        init(); initBanners();
    </script>
</body>
</html>
